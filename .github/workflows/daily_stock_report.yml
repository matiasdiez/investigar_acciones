name: 📈 Daily Stock Report

on:
  # Disparo automático: lunes a viernes a las 21:00 ET (01:00 UTC del día siguiente)
  schedule:
    - cron: "0 21 * * 1-5"

  # Disparo manual desde la pestaña Actions de GitHub (útil para testear)
  workflow_dispatch:
    inputs:
      send_email:
        description: "¿Enviar reporte por email?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  generate-report:
    name: Generar y distribuir reporte
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 4. Generar el reporte con Claude API
      - name: Generar reporte de acciones
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_analysis.py

      # 5. Enviar por email (condicional)
      - name: Enviar reporte por email
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.send_email == 'true'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python send_email.py

      # 6. Commitear el reporte al repositorio (queda disponible para descarga)
      - name: Guardar reporte en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reportes/
          git diff --cached --quiet || git commit -m "📈 Reporte diario: $(date +'%Y-%m-%d')"
          git push
